# MLFactors 默认配置

data:
  cache_dir: "/home/setsu/workspace/MLFactors/cache"
  # 最多加载多少只股票（null = 不限制）
  max_stocks: 300
  # 列名映射（source_col -> schema_col），留空则使用默认名
  column_mapping: {}

factors:
  # 额外的因子搜索目录（绝对路径列表）
  extra_paths: []

evaluation:
  # 前向收益计算周期（交易日）
  forward_periods: [1, 5, 10, 20]
  # IC 计算方法: rank (Spearman) 或 pearson
  ic_method: "rank"
  # 分层回测分组数
  n_groups: 5
  # IC 衰减最大滞后期
  ic_decay_max_lag: 20
  # 图表展示使用的前向预测周期（须在 forward_periods 中）
  plot_period: 5

backtest:
  # 回测起止日期（留空则使用数据全量）
  start_date: "20240101"
  end_date: "20260101"
  benchmark: null

output:
  # 报告输出目录
  dir: "outputs"
  # 是否保存图表
  save_plots: true

model:
  # 交叉验证折数
  cv_splits: 5
  # 随机种子
  seed: 42
