# MLFactors — 择时类因子测试默认配置
# 对应测试管线: pipeline.timing_runner.TimingPipeline

data:
  cache_dir: "/home/setsu/workspace/MLFactors/cache"
  # 最多加载多少只股票（null = 不限制）
  max_stocks: 300
  # 列名映射（source_col -> schema_col），留空则使用默认名
  column_mapping: {}

factors:
  # 额外的因子搜索目录（绝对路径列表）
  extra_paths: []

evaluation:
  # 计算收益使用的价格列（close / open / adj_close）
  timing_price_col: "close"
  # 年化交易日数
  timing_trading_days: 252
  # 无风险利率（年化，用于夏普计算）
  timing_risk_free: 0.0

backtest:
  # 回测起止日期（留空则使用数据全量）
  start_date: "20240101"
  end_date: "20260101"
  # 基准股票/指数代码（null = 无基准，超额指标以 0 为基准）
  benchmark: null

output:
  # 报告输出目录
  dir: "outputs"
  # 是否保存图表
  save_plots: true
